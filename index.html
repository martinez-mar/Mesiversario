<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>...</title> <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&family=Permanent+Marker&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="loader-overlay">
    <div class="loader-content">
      <button class="loader-btn">
        <svg class="infinite-svg" viewBox="0 0 100 50">
          <path class="infinite-path"
            d="M20,25 C20,10 40,10 50,25 C60,40 80,40 80,25 C80,10 60,10 50,25 C40,40 20,40 20,25 z" />
        </svg>
      </button>

      <div class="arrow-up">↑</div>
      <p class="click-hint" id="loading-hint"></p>
      <p class="loader-message" id="loading-msg"></p>
    </div>
  </div>

  <div id="canvas-container"></div>

  <audio id="bg-music" loop muted></audio>

  <button id="music-toggle" class="music-btn">
    <span class="music-icon">🎵</span>
  </button>

  <section id="intro">
    <div class="title-wrapper" style="min-height: 80px;">
        <h1 id="hero-title"></h1>
    </div>
    <div id="hero-date-counter" class="date-counter-anim"></div>
    <div id="final-reveal">
      <div class="final-text" id="hero-final-text"></div>
      <div class="heart-wrapper">
        <div class="burning-heart">❤️‍🔥</div>
      </div>
      <div class="scroll-indicator">
        <span id="scroll-text"></span>
        <div class="arrow-down"></div>
      </div>
    </div>

    <button class="btn-primary" onclick="scrollToSection('timeline')">
      <span>Empezar el viaje</span>
    </button>
  </section>

  <section id="timeline">
    <div class="timeline" id="timeline-container"></div>
  </section>

  <section id="gallery">
    <h1 id="gallery-title"></h1>
    <div class="gallery" id="gallery-container"></div>
  </section>

  <section>
    <h1 id="final-message"></h1>
    <div class="heart-wrapper">
      <div class="burning-heart">❤️‍🔥</div>
    </div>
    <br>
  </section>

  <script src="libs/gsap.min.js"></script>
  <script src="libs/ScrollTrigger.min.js"></script>
  
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>

</html>
